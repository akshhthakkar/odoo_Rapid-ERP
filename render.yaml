services:
  # ─── BACKEND WEB SERVICE ─────────────────────────────────────────────────────
  - type: web
    name: odoo-rapid-erp-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: JWT_EXPIRES_IN
        value: 30m
      - key: FRONTEND_URL
        value: https://odoo-rapid-erp.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SMTP_USER
        sync: false
      - key: EMAIL_FROM
        sync: false

  # ─── FRONTEND STATIC SITE (Optional) ──────────────────────────────────────────
  - type: static
    name: odoo-rapid-erp-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    headers:
      - path: /*
        headers:
          - key: Cache-Control
            value: no-cache
    routes:
      # Rewrite all routes to index.html for React client-side routing
      - type: rewrite
        source: /*
        destination: /index.html
